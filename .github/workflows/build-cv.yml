name: Build CV

permissions:
  contents: write
  
on:
  push:
    branches: [main]
    paths:
      - "**.typ"
      - "content/**"
      - ".github/workflows/build-cv.yml"
  pull_request:
    paths:
      - "**.typ"
      - "content/**"
      - ".github/workflows/build-cv.yml"
  workflow_dispatch:

jobs:
  build-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: cv
        
      - name: Checkout public CV data
        uses: actions/checkout@v4
        with:
          repository: libgober/cv-data
          path: cv-data
          ref: main
      
      - name: Stage CV data
        run: |
          cp cv-data/cv.yaml cv/content/cv.yaml
          cp cv-data/publications.bib cv/content/publications.bib
      
      - name: Install Typst
        uses: typst-community/setup-typst@v5

      - name: Compile CV
        working-directory: cv
        run: |
          typst compile cv.typ cv.pdf

      - name: Upload CV PDF
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: cv/cv.pdf

      - name: Commit updated CV PDF
        working-directory: cv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update compiled CV PDF"
            git push
          fi
